<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Upload Book – BookVerse</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark px-4">
  <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">📚 BookVerse</a>
  <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Logout</a>
</nav>
<div class="container mt-4" style="max-width:560px;">
  <h4 class="mb-1">Upload a Book</h4>
  <p class="text-muted small mb-4">Fill in the details. Admin will review before it goes live.</p>
  {% if messages %}
    {% for msg in messages %}
      <div class="alert alert-info">{{ msg }}</div>
    {% endfor %}
  {% endif %}
  <div class="card p-4">
    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}
      {% for field in form %}
        <div class="mb-3">
          <label class="form-label fw-semibold">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}
            <div class="text-danger small">{{ field.errors }}</div>
          {% endif %}
        </div>
      {% endfor %}
      <button type="submit" class="btn btn-dark w-100">Submit for Review</button>
    </form>
  </div>
</div>
</body>
</html>
