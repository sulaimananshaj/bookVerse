<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Dashboard – BookVerse</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-4">
  <span class="navbar-brand fw-bold">📚 BookVerse</span>
  <div>
    <span class="text-white me-3">{{ user.username }}</span>
    <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Logout</a>
  </div>
</nav>

<div class="container mt-5">
  <h4>Welcome, {{ user.username }}! 👋</h4>
  <p class="text-muted">
    Department: {{ user.get_department_display }} &nbsp;|&nbsp;
    Semester: {{ user.semester }}
  </p>
  <hr/>
  <div class="row g-3 mt-2">
    <div class="col-6">
      <div class="card text-center p-4 h-100">
        <h5>📝 PYQ Section</h5>
        <p class="text-muted small">Browse previous year questions</p>
        <a href="#" class="btn btn-dark btn-sm mt-auto">Go to PYQ</a>
      </div>
    </div>
    <div class="col-6">
      <div class="card text-center p-4 h-100">
        <h5>🛒 Books</h5>
        <p class="text-muted small">Buy, sell &amp; bid on books</p>
        <a href="{% url 'book_list' %}" class="btn btn-dark btn-sm mt-auto">Go to Books</a>
      </div>
    </div>
  </div>
</div>

</body>
</html>
