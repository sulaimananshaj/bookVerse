<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>BookVerse</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width:480px;">

  <h2 class="text-center fw-bold mb-1">📚 BookVerse</h2>
  <p class="text-center text-muted mb-4">Buy, sell &amp; bid on college books</p>

  {% if messages %}
    {% for msg in messages %}
      <div class="alert alert-info">{{ msg }}</div>
    {% endfor %}
  {% endif %}

  <ul class="nav nav-tabs mb-3">
    <li class="nav-item">
      <a class="nav-link {% if tab != 'register' %}active{% endif %}"
         href="#login" data-bs-toggle="tab">Login</a>
    </li>
    <li class="nav-item">
      <a class="nav-link {% if tab == 'register' %}active{% endif %}"
         href="#register" data-bs-toggle="tab">Register</a>
    </li>
  </ul>

  <div class="tab-content bg-white p-4 border rounded">

    <!-- LOGIN -->
    <div class="tab-pane fade {% if tab != 'register' %}show active{% endif %}" id="login">
      <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" required/>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required/>
        </div>
        <button type="submit" class="btn btn-dark w-100">Login</button>
      </form>
    </div>

    <!-- REGISTER -->
    <div class="tab-pane fade {% if tab == 'register' %}show active{% endif %}" id="register">
      <form method="POST" action="{% url 'register' %}">
        {% csrf_token %}
        {{ register_form.as_p }}
        <button type="submit" class="btn btn-dark w-100 mt-2">Create Account</button>
      </form>
    </div>

  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
