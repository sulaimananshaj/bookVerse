<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Admin Login – BookVerse</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-dark" style="min-height:100vh; display:flex; align-items:center; justify-content:center;">
<div class="card p-4" style="width:100%; max-width:380px;">
  <h5 class="fw-bold mb-1">📚 BookVerse</h5>
  <p class="text-muted small mb-3">Admin login</p>
  {% if messages %}
    {% for msg in messages %}
      <div class="alert alert-danger py-2 small">{{ msg }}</div>
    {% endfor %}
  {% endif %}
  <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" name="email" class="form-control" required/>
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" required/>
    </div>
    <button type="submit" class="btn btn-dark w-100">Login as Admin</button>
  </form>
</div>
</body>
</html>
